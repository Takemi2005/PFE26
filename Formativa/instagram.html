<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface do Instagram</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">Instagram</div>
            <nav>
                <a href="imagens/icon/home_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg" class="nav-item">Home</a>
                <a href="imagens/icon/explore_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg" class="nav-item">Explorar</a>
                <a href="imagens/icon/message_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg" class="nav-item">Mensagens</a>
                <a href="imagens/icon/notifications_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg" class="nav-item">Notificações</a>
                <a href="imagens/icon/create_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg" class="nav-item">Criar</a>
                <a href="imagens/icon/profile_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg" class="nav-item">Perfil</a>
            </nav>
        </aside>
        
        <main class="feed">
            <div class="stories">
                <div class="story">Sua história</div>
                <div class="story">Luiza_pt</div>
                <div class="story">MC_lan</div>
            </div>
            
            <div class="posts">
                <article class="post">
                    <div class="post-header">
                        <img src="rato.jpg" alt="Avatar">
                        <div>
                            <p class="username">MC_lan</p>
                            <p class="location">@Bar_do_meio</p>
                        </div>
                    </div>
                    <img src="duckie _3.jpg" alt="Post" class="post-image">
                    <div class="post-actions">
                        <button>❤️</button>
                        <button>💬</button>
                        <button>📤</button>
                    </div>
                    <p class="likes">500 curtidas</p>
                    <p class="caption"><strong>MC_lan</strong>Never Say Never 
                    #APAA</p>
                </article>
            </div>
        </main>
        
        <aside class="sidebar-right">
            <div class="suggestions">
                <h3>Sugestões para você</h3>
                <div class="user-suggestion">
                    <img src="miss kitty.jpg" alt="Avatar">
                    <div>
                        <p>Vinagrette</p>
                        <small>Seguido por...</small>
                    </div>
                    <button>Seguir</button>
                </div>
            </div>
        </aside>
    </div>
</body>
</html>
